<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Book</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/add-book.css}">
</head>

<body>

    <div class="navbar">
        <div class="nav-left">
            <strong>BookStore</strong>
        </div>
        <div class="nav-right">
            <a th:href="@{/books}">Books</a>

            <form th:action="@{/logout}" method="post" class="logout-form">
                <button type="submit" class="logout-btn">Logout</button>
            </form>
        </div>
    </div>

    <div class="container">

        <div class="form-wrapper">

            <h1>Add New Book</h1>

            <div th:if="${errorMessage}" class="error-message">
                <p th:text="${errorMessage}"></p>
            </div>

            <form th:action="@{/save-book}"
                  th:object="${book}"
                  method="post"
                  enctype="multipart/form-data"
                  class="book-form">

                <div class="form-group">
                    <label>Title</label>
                    <input type="text" th:field="*{title}" />
                    <div class="error-message"
                         th:if="${#fields.hasErrors('title')}"
                         th:errors="*{title}">
                    </div>
                </div>

                <div class="form-group">
                    <label>Author</label>
                    <input type="text" th:field="*{author}" />
                    <div class="error-message"
                         th:if="${#fields.hasErrors('author')}"
                         th:errors="*{author}">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Price</label>
                        <input type="number" step="0.01" th:field="*{price}" />
                        <div class="error-message"
                             th:if="${#fields.hasErrors('price')}"
                             th:errors="*{price}">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Quantity</label>
                        <input type="number" th:field="*{quantity}" />
                        <div class="error-message"
                             th:if="${#fields.hasErrors('quantity')}"
                             th:errors="*{quantity}">
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea th:field="*{description}" rows="4"></textarea>
                </div>

                <div class="form-group">
                    <label>Image</label>
                    <input type="file" name="image"/>
                </div>

                <div class="form-group">
                    <label>Category</label>
                    <select th:field="*{category}" required>
                        <option value="" disabled>Select Category</option>
                        <option th:each="cat : ${categories}"
                                th:value="${cat.id}"
                                th:text="${cat.name}">
                        </option>
                    </select>
                </div>

                <div class="form-buttons">
                    <button type="submit" class="save-btn">Save Book</button>
                    <a th:href="@{/books}" class="back-btn">Cancel</a>
                </div>

            </form>

        </div>

    </div>
    
    <footer class="footer">
        <div class="footer-content">
            <p>© 2026 BookStore | Built with Spring Boot & Thymeleaf</p>
            <p class="footer-sub">
                Admin Panel Project – Developed by Kristian Lala
            </p>
        </div>
    </footer>
    
</body>

</html>
