<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Book</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/edit-book.css}">

</head>

<body>

    <div class="navbar">
        <div class="nav-left">
            <strong>BookStore</strong>
        </div>
        <div class="nav-right">
            <a th:href="@{/books}">Books</a>

            <form th:action="@{/logout}" method="post" class="logout-form">
                <button type="submit" class="logout-btn">Logout</button>
            </form>
        </div>
    </div>

    <div class="container">

        <div class="form-wrapper">

            <h1>Edit Book</h1>

            <form th:action="@{/update-book}"
                  method="post"
                  th:object="${book}"
                  enctype="multipart/form-data"
                  class="book-form">

                <input type="hidden" th:field="*{id}" />

                <div class="form-group">
                    <label>Title</label>
                    <input type="text" th:field="*{title}" />
                </div>

                <div class="form-group">
                    <label>Author</label>
                    <input type="text" th:field="*{author}" />
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Price</label>
                        <input type="number" step="0.01" th:field="*{price}" />
                    </div>

                    <div class="form-group">
                        <label>Quantity</label>
                        <input type="number" th:field="*{quantity}" />
                    </div>
                </div>

                <!-- Current Image -->
                <div class="form-group" th:if="${book.imagePath != null}">
                    <label>Current Image</label>
                    <div class="current-image">
                        <img th:src="@{'/uploads/' + ${book.imagePath}}"
                             alt="Current Image"/>
                    </div>
                </div>

                <!-- Change Image -->
                <div class="form-group">
                    <label>Change Image</label>
                    <input type="file" name="image"/>
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea th:field="*{description}" rows="4"></textarea>
                </div>

                <div class="form-group">
                    <label>Category</label>
                    <select th:field="*{category}" required>
                        <option th:each="cat : ${categories}"
                                th:value="${cat.id}"
                                th:text="${cat.name}">
                        </option>
                    </select>
                </div>

                <div class="form-buttons">
                    <button type="submit" class="update-btn">Update Book</button>
                    <a th:href="@{/books}" class="back-btn">Cancel</a>
                </div>

            </form>

        </div>

    </div>
    
    <footer class="footer">
        <div class="footer-content">
            <p>© 2026 BookStore | Built with Spring Boot & Thymeleaf</p>
            <p class="footer-sub">
                Admin Panel Project – Developed by Kristian Lala
            </p>
        </div>
    </footer>
</body>

</html>
